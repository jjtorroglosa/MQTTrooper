---
- name: Assert Debian-family target
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "The mqttrooper role only supports Debian-family systems."

- name: Assert a binary source was provided
  ansible.builtin.assert:
    that:
      - mqttrooper_binary_src | length > 0
    fail_msg: "mqttrooper_binary_src must be set to a URL or local path."

- name: Ensure mqttrooper group exists
  ansible.builtin.group:
    name: "{{ mqttrooper_group }}"
    system: true
    state: present

- name: Ensure mqttrooper system user exists
  ansible.builtin.user:
    name: "{{ mqttrooper_user }}"
    group: "{{ mqttrooper_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ mqttrooper_working_dir }}"
    create_home: false
    state: present

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ mqttrooper_config_dir }}"
    state: directory
    owner: root
    group: "{{ mqttrooper_group }}"
    mode: "0750"

- name: Ensure runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ mqttrooper_user }}"
    group: "{{ mqttrooper_group }}"
    mode: "0750"
  loop:
    - "{{ mqttrooper_log_dir }}"
    - "{{ mqttrooper_working_dir }}"

- name: Install mqttrooper binary (from URL)
  ansible.builtin.get_url:
    url: "{{ mqttrooper_binary_src }}"
    dest: "{{ mqttrooper_install_dir }}/mqttrooper"
    checksum: "{{ mqttrooper_binary_checksum | default(omit, true) }}"
    owner: root
    group: root
    mode: "0755"
  when: mqttrooper_binary_src is match('^https?://')
  notify: restart mqttrooper

- name: Install mqttrooper binary (from control node)
  ansible.builtin.copy:
    src: "{{ mqttrooper_binary_src }}"
    dest: "{{ mqttrooper_install_dir }}/mqttrooper"
    owner: root
    group: root
    mode: "0755"
  when: mqttrooper_binary_src is not match('^https?://')
  notify: restart mqttrooper

- name: Render mqttrooper config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ mqttrooper_config_path }}"
    owner: root
    group: "{{ mqttrooper_group }}"
    mode: "0640"
  notify: restart mqttrooper

- name: Install systemd unit
  ansible.builtin.template:
    src: mqttrooper.service.j2
    dest: /etc/systemd/system/mqttrooper.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart mqttrooper

- name: Enable and start mqttrooper
  ansible.builtin.systemd:
    name: mqttrooper
    enabled: "{{ mqttrooper_service_enabled }}"
    state: "{{ mqttrooper_service_state }}"
    daemon_reload: true
